---
- name: Install host packages for uv and mkosi development
  ansible.builtin.apt:
    name: "{{ host_packages }}"
    state: present
    update_cache: true
  become: true
  when: install_host_packages | bool

- name: Check whether uv is installed
  ansible.builtin.command: bash -lc 'source ~/.local/bin/env 2>/dev/null || true; command -v uv'
  register: uv_check
  changed_when: false
  failed_when: false
  when: install_uv | bool

- name: Install uv with the official installer
  ansible.builtin.shell: curl -LsSf https://astral.sh/uv/install.sh | sh
  args:
    executable: /bin/bash
  when:
    - install_uv | bool
    - uv_check.rc != 0

- name: Ensure project root exists
  ansible.builtin.file:
    path: "{{ project_root }}"
    state: directory
    mode: "0755"

- name: Check whether pyproject.toml exists
  ansible.builtin.stat:
    path: "{{ project_root }}/{{ project_name }}/pyproject.toml"
  register: pyproject_stat

- name: Create packaged uv project
  ansible.builtin.command: bash -lc 'source ~/.local/bin/env; uv init --package {{ project_name | quote }}'
  args:
    chdir: "{{ project_root }}"
  when:
    - create_project | bool
    - not pyproject_stat.stat.exists

- name: Add uv dev dependencies
  ansible.builtin.command: bash -lc 'source ~/.local/bin/env; uv add --dev {{ dev_dependencies | map("quote") | join(" ") }}'
  args:
    chdir: "{{ project_root }}/{{ project_name }}"
  when:
    - add_dev_dependencies | bool
    - dev_dependencies | length > 0

- name: Write mkosi configuration
  ansible.builtin.template:
    src: mkosi.conf.j2
    dest: "{{ project_root }}/{{ project_name }}/mkosi.conf"
    mode: "0644"

- name: Ensure mkosi overlay directories exist
  ansible.builtin.file:
    path: "{{ project_root }}/{{ project_name }}/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - mkosi.extra/usr/local/bin
    - mkosi.extra/usr/local/libexec
    - mkosi.extra/usr/lib/sysusers.d
    - mkosi.extra/etc/systemd/system/default.target.wants
    - mkosi.extra/etc/systemd/system/multi-user.target.wants
    - mkosi.extra/etc/systemd/system/network-online.target.wants
    - mkosi.extra/etc/systemd/system/sysinit.target.wants
    - mkosi.extra/etc/systemd/network
    - mkosi.extra/etc/sudoers.d
    - mkosi.extra/home/vagrant/.ssh

- name: Write boot payload
  ansible.builtin.template:
    src: boot-payload.py.j2
    dest: "{{ project_root }}/{{ project_name }}/mkosi.extra/usr/local/bin/{{ project_name }}"
    mode: "0755"

- name: Write boot payload service
  ansible.builtin.template:
    src: boot-payload.service.j2
    dest: "{{ project_root }}/{{ project_name }}/mkosi.extra/etc/systemd/system/{{ project_name }}.service"
    mode: "0644"

- name: Enable boot payload service in image overlay
  ansible.builtin.file:
    src: "../{{ project_name }}.service"
    dest: "{{ project_root }}/{{ project_name }}/mkosi.extra/etc/systemd/system/default.target.wants/{{ project_name }}.service"
    state: link

- name: Write DHCP network configuration
  ansible.builtin.template:
    src: 20-dhcp.network.j2
    dest: "{{ project_root }}/{{ project_name }}/mkosi.extra/etc/systemd/network/20-dhcp.network"
    mode: "0644"

- name: Write vagrant sysusers configuration
  ansible.builtin.template:
    src: sysusers-vagrant.conf.j2
    dest: "{{ project_root }}/{{ project_name }}/mkosi.extra/usr/lib/sysusers.d/{{ project_name }}.conf"
    mode: "0644"

- name: Write vagrant sudoers configuration
  ansible.builtin.template:
    src: sudoers-vagrant.j2
    dest: "{{ project_root }}/{{ project_name }}/mkosi.extra/etc/sudoers.d/vagrant"
    mode: "0440"

- name: Write vagrant authorized_keys
  ansible.builtin.copy:
    content: "{{ vagrant_ssh_public_key }}\n"
    dest: "{{ project_root }}/{{ project_name }}/mkosi.extra/home/vagrant/.ssh/authorized_keys"
    mode: "0600"

- name: Write vagrant-setup service
  ansible.builtin.template:
    src: vagrant-setup.service.j2
    dest: "{{ project_root }}/{{ project_name }}/mkosi.extra/etc/systemd/system/{{ project_name }}-vagrant-setup.service"
    mode: "0644"

- name: Write vagrant-setup script
  ansible.builtin.template:
    src: vagrant-setup.j2
    dest: "{{ project_root }}/{{ project_name }}/mkosi.extra/usr/local/libexec/{{ project_name }}-vagrant-setup"
    mode: "0755"

- name: Mask ssh.socket in image overlay
  ansible.builtin.file:
    src: /dev/null
    dest: "{{ project_root }}/{{ project_name }}/mkosi.extra/etc/systemd/system/ssh.socket"
    state: link

- name: Enable systemd units in multi-user.target
  ansible.builtin.file:
    src: "{{ item.src }}"
    dest: "{{ project_root }}/{{ project_name }}/mkosi.extra/etc/systemd/system/multi-user.target.wants/{{ item.name }}"
    state: link
  loop:
    - name: "{{ project_name }}-vagrant-setup.service"
      src: "../{{ project_name }}-vagrant-setup.service"
    - name: ssh.service
      src: "../../../../usr/lib/systemd/system/ssh.service"
    - name: systemd-networkd.service
      src: "../../../../usr/lib/systemd/system/systemd-networkd.service"

- name: Enable systemd-networkd-wait-online in network-online.target
  ansible.builtin.file:
    src: "../../../../usr/lib/systemd/system/systemd-networkd-wait-online.service"
    dest: "{{ project_root }}/{{ project_name }}/mkosi.extra/etc/systemd/system/network-online.target.wants/systemd-networkd-wait-online.service"
    state: link

- name: Enable systemd-resolved in sysinit.target
  ansible.builtin.file:
    src: "../../../../usr/lib/systemd/system/systemd-resolved.service"
    dest: "{{ project_root }}/{{ project_name }}/mkosi.extra/etc/systemd/system/sysinit.target.wants/systemd-resolved.service"
    state: link
