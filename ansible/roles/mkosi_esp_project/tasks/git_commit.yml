---
- name: Stage mkosi project source inputs
  ansible.builtin.command: git add mkosi.conf .gitignore README.md mkosi.extra
  args:
    chdir: "{{ mkosi_esp_project_dir }}"
  become: true
  become_user: "{{ mkosi_esp_project_owner }}"
  changed_when: false

- name: Check staged project changes
  ansible.builtin.command: git diff --cached --quiet
  args:
    chdir: "{{ mkosi_esp_project_dir }}"
  become: true
  become_user: "{{ mkosi_esp_project_owner }}"
  register: mkosi_esp_git_cached_diff
  changed_when: mkosi_esp_git_cached_diff.rc == 1
  failed_when: mkosi_esp_git_cached_diff.rc not in [0, 1]

- name: Commit staged project changes
  ansible.builtin.command: >-
    git
    -c user.name={{ mkosi_esp_project_git_user_name | quote }}
    -c user.email={{ mkosi_esp_project_git_user_email | quote }}
    commit
    {{ '-S' if mkosi_esp_project_git_sign_commits | bool else '' }}
    -m {{ mkosi_esp_git_commit_message | quote }}
  args:
    chdir: "{{ mkosi_esp_project_dir }}"
  become: true
  become_user: "{{ mkosi_esp_project_owner }}"
  when: mkosi_esp_git_cached_diff.rc == 1
