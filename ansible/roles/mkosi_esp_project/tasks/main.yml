---
- name: Install host packages for mkosi ESP builds
  ansible.builtin.apt:
    name: "{{ mkosi_esp_host_packages }}"
    state: present
    update_cache: true
  become: true
  when: mkosi_esp_install_host_packages | bool

- name: Resolve optional root password
  ansible.builtin.set_fact:
    mkosi_esp_effective_root_password: >-
      {{
        mkosi_esp_root_password
        if (mkosi_esp_root_password | length > 0)
        else (
          lookup('ansible.builtin.file', mkosi_esp_root_password_file, errors='ignore') | trim
          if (mkosi_esp_root_password_file | length > 0)
          else lookup('ansible.builtin.env', mkosi_esp_root_password_env)
        )
      }}
  no_log: true

- name: Set initial mkosi release
  ansible.builtin.set_fact:
    mkosi_esp_effective_release: "{{ mkosi_esp_release }}"

- name: Check mkosi version
  ansible.builtin.command: mkosi --version
  register: mkosi_esp_version_cmd
  changed_when: false

- name: Set mkosi compatibility facts
  ansible.builtin.set_fact:
    mkosi_esp_mkosi_major_version: "{{ mkosi_esp_version_cmd.stdout | regex_search('[0-9]+') | int }}"
    mkosi_esp_legacy_mkosi: "{{ (mkosi_esp_version_cmd.stdout | regex_search('[0-9]+') | int) < 15 }}"
    mkosi_esp_effective_architecture: >-
      {{
        'x86_64'
        if (
          mkosi_esp_architecture == 'x86-64'
          and ((mkosi_esp_version_cmd.stdout | regex_search('[0-9]+') | int) < 15)
        )
        else mkosi_esp_architecture
      }}
    mkosi_esp_effective_output_format: >-
      {{
        mkosi_esp_legacy_uki_output_format
        if (
          mkosi_esp_output_format == 'uki'
          and ((mkosi_esp_version_cmd.stdout | regex_search('[0-9]+') | int) < 15)
        )
        else mkosi_esp_output_format
      }}

- name: Create mkosi ESP project
  ansible.builtin.include_tasks: project.yml
  when: mkosi_esp_project_create | bool

- name: Build mkosi ESP artifact
  ansible.builtin.include_tasks: build.yml
  when: mkosi_esp_project_build | bool
