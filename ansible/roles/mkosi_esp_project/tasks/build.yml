---
- name: Build UKI with mkosi
  block:
    - name: Run mkosi build
      ansible.builtin.command: mkosi -f build
      args:
        chdir: "{{ mkosi_esp_project_dir }}"
      register: mkosi_esp_build_result
      changed_when: true
  rescue:
    - name: Check whether release fallback applies
      ansible.builtin.set_fact:
        mkosi_esp_release_fallback_applies: >-
          {{
            mkosi_esp_build_result.stderr | default('')
            is search('(?i)(suite|404|not found|does not have a release file|no such distribution|invalid release|unknown release)')
          }}

    - name: Stop when mkosi failed for a non-release reason
      ansible.builtin.fail:
        msg: "{{ mkosi_esp_build_result.stderr | default(mkosi_esp_build_result.msg) }}"
      when: not mkosi_esp_release_fallback_applies | bool

    - name: Stop when release fallback is disabled
      ansible.builtin.fail:
        msg: "mkosi build failed for {{ mkosi_esp_effective_release }} and release fallback is disabled."
      when: not mkosi_esp_allow_release_fallback | bool

    - name: Stop when no alternate release is configured
      ansible.builtin.fail:
        msg: "mkosi build failed for {{ mkosi_esp_effective_release }} and mkosi_esp_release_fallback is empty."
      when: mkosi_esp_release_fallback | length == 0

    - name: Switch to fallback mkosi release
      ansible.builtin.set_fact:
        mkosi_esp_effective_release: "{{ mkosi_esp_release_fallback }}"
      when: mkosi_esp_effective_release != mkosi_esp_release_fallback

    - name: Render fallback mkosi configuration
      ansible.builtin.template:
        src: mkosi.conf.j2
        dest: "{{ mkosi_esp_project_dir }}/mkosi.conf"
        owner: "{{ mkosi_esp_project_owner }}"
        group: "{{ mkosi_esp_project_group }}"
        mode: "0644"
      no_log: "{{ (mkosi_esp_effective_root_password | default('') | length) > 0 }}"

    - name: Commit fallback release change
      ansible.builtin.include_tasks: git_commit.yml
      vars:
        mkosi_esp_git_commit_message: "Use fallback mkosi release {{ mkosi_esp_release_fallback }}"
      when:
        - mkosi_esp_project_git_enabled | bool
        - mkosi_esp_project_git_commit_on_change | bool

    - name: Retry mkosi build with fallback release
      ansible.builtin.command: mkosi -f build
      args:
        chdir: "{{ mkosi_esp_project_dir }}"
      changed_when: true

- name: Check generated UKI
  ansible.builtin.stat:
    path: "{{ mkosi_esp_uki_path }}"
  register: mkosi_esp_uki_stat

- name: Locate generated UKI when mkosi used release subdirectories
  ansible.builtin.find:
    paths: "{{ mkosi_esp_project_dir }}/{{ mkosi_esp_output_directory }}"
    patterns: "{{ mkosi_esp_project_name }}*.efi"
    recurse: true
    file_type: file
  register: mkosi_esp_uki_find
  when: not mkosi_esp_uki_stat.stat.exists

- name: Set generated UKI source path
  ansible.builtin.set_fact:
    mkosi_esp_generated_uki_path: >-
      {{
        mkosi_esp_uki_path
        if mkosi_esp_uki_stat.stat.exists
        else (
          mkosi_esp_uki_find.files
          | sort(attribute='mtime', reverse=true)
          | map(attribute='path')
          | first
        )
      }}

- name: Check located UKI
  ansible.builtin.stat:
    path: "{{ mkosi_esp_generated_uki_path }}"
  register: mkosi_esp_generated_uki_stat
  failed_when: not mkosi_esp_generated_uki_stat.stat.exists

- name: Copy UKI into artifact directory
  ansible.builtin.copy:
    src: "{{ mkosi_esp_generated_uki_path }}"
    dest: "{{ mkosi_esp_uki_artifact_path }}"
    remote_src: true
    mode: "0644"

- name: Convert ESP extra size to bytes
  ansible.builtin.command: "numfmt --from=iec {{ mkosi_esp_extra_size | quote }}"
  register: mkosi_esp_extra_size_bytes_cmd
  changed_when: false

- name: Convert ESP size rounding to bytes
  ansible.builtin.command: "numfmt --from=iec {{ mkosi_esp_size_rounding | quote }}"
  register: mkosi_esp_size_rounding_bytes_cmd
  changed_when: false

- name: Calculate ESP image size
  ansible.builtin.set_fact:
    mkosi_esp_uki_size: "{{ mkosi_esp_generated_uki_stat.stat.size | int }}"
    mkosi_esp_extra_size_bytes: "{{ mkosi_esp_extra_size_bytes_cmd.stdout | int }}"
    mkosi_esp_size_rounding_bytes: "{{ mkosi_esp_size_rounding_bytes_cmd.stdout | int }}"
    mkosi_esp_image_size_bytes: >-
      {{
        (
          (
            (mkosi_esp_generated_uki_stat.stat.size | int)
            + (mkosi_esp_extra_size_bytes_cmd.stdout | int)
            + (mkosi_esp_size_rounding_bytes_cmd.stdout | int)
            - 1
          )
          // (mkosi_esp_size_rounding_bytes_cmd.stdout | int)
        )
        * (mkosi_esp_size_rounding_bytes_cmd.stdout | int)
      }}

- name: Remove previous ESP image
  ansible.builtin.file:
    path: "{{ mkosi_esp_image_path }}"
    state: absent
  when: mkosi_esp_recreate_esp | bool

- name: Create ESP image file
  ansible.builtin.command: "truncate -s {{ mkosi_esp_image_size_bytes }} {{ mkosi_esp_image_path | quote }}"
  changed_when: true

- name: Format ESP image as FAT32
  ansible.builtin.command: "mkfs.vfat -F 32 -n {{ mkosi_esp_label | quote }} {{ mkosi_esp_image_path | quote }}"
  changed_when: true

- name: Create EFI directory in ESP image
  ansible.builtin.command: "mmd -i {{ mkosi_esp_image_path | quote }} ::/EFI"
  register: mkosi_esp_mmd_efi
  changed_when: mkosi_esp_mmd_efi.rc == 0
  failed_when: mkosi_esp_mmd_efi.rc not in [0, 1]

- name: Create EFI boot directory in ESP image
  ansible.builtin.command: "mmd -i {{ mkosi_esp_image_path | quote }} ::/EFI/BOOT"
  register: mkosi_esp_mmd_boot
  changed_when: mkosi_esp_mmd_boot.rc == 0
  failed_when: mkosi_esp_mmd_boot.rc not in [0, 1]

- name: Copy UKI to removable-media boot path
  ansible.builtin.command: "mcopy -i {{ mkosi_esp_image_path | quote }} -o {{ mkosi_esp_uki_artifact_path | quote }} {{ mkosi_esp_boot_file | quote }}"
  changed_when: true

- name: Verify ESP boot directory
  ansible.builtin.command: "mdir -i {{ mkosi_esp_image_path | quote }} ::/EFI/BOOT"
  register: mkosi_esp_mdir_boot
  changed_when: false
  when: mkosi_esp_verify_esp | bool

- name: Assert UKI exists in ESP image
  ansible.builtin.assert:
    that:
      - "'BOOTX64' in mkosi_esp_mdir_boot.stdout"
    fail_msg: "ESP image does not contain EFI/BOOT/BOOTX64.EFI"
  when: mkosi_esp_verify_esp | bool
