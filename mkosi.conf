[Distribution]
Distribution=debian
Release=trixie
Architecture=x86-64

[Output]
Format=uki
Output=pe-uki-lab
OutputDirectory=mkosi.output

[Build]
CacheDirectory=mkosi.cache

[Content]
Packages=systemd
         udev
         linux-image-amd64
         python3
         kmod
         dbus
         systemd-boot-efi
KernelCommandLine=console=ttyS0 quiet
